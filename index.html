<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人生模拟器</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">
    <header class="hero">
      <div>
        <h1>人生模拟器</h1>
        <p class="subtitle">阅读事件，做出选择，承担长期后果，走完属于你的一生。</p>
      </div>
      <button id="restart-btn" class="ghost-button" type="button">重新开始</button>
    </header>

    <main class="layout">
      <section class="panel primary-panel">
        <div class="panel-header">
          <h2>当前人生阶段</h2>
          <div class="panel-badges">
            <div class="stage-badge">阶段：<span id="stage-value">未开始</span></div>
            <div class="age-badge">年龄：<span id="age-value">0</span></div>
            <div class="gender-badge">性别：<span id="gender-value">未选择</span></div>
          </div>
        </div>

        <div id="story-section" class="story-section">
          <h3 id="event-title">加载中...</h3>
          <div id="story-text" class="story-text"></div>
        </div>

        <div>
          <h3>你的选择</h3>
          <div id="options-container" class="options-container"></div>
        </div>
      </section>

      <aside class="sidebar">
        <section class="panel">
          <h2>当前属性</h2>
          <div id="stats-container" class="stats-grid"></div>
        </section>

        <section class="panel">
          <h2>家庭背景</h2>
          <div id="family-background-container"></div>
        </section>

        <section class="panel">
          <h2>成长路线</h2>
          <div id="route-container"></div>
        </section>

        <section class="panel">
          <h2>人际 / 恋爱</h2>
          <div id="relationships-container" class="relationship-list"></div>
        </section>

        <section class="panel">
          <h2>物品栏</h2>
          <div id="inventory-container"></div>
        </section>

        <section class="panel shop-entry-panel">
          <h2>商店</h2>
          <p id="shop-hint" class="muted shop-hint">开局并完成家庭背景后，16–55 岁可随时在此购物（与随机事件「街边购物」商品一致）。</p>
          <button type="button" id="shop-open-btn" class="ghost-button shop-open-button">进入商店</button>
        </section>

        <section class="panel">
          <h2>家庭与子女</h2>
          <div id="family-life-container"></div>
        </section>

        <section class="panel">
          <h2>人生大事日志</h2>
          <div id="history-container" class="history-list"></div>
        </section>
      </aside>
    </main>
  </div>

  <div id="shop-modal" class="shop-modal" hidden aria-hidden="true">
    <div class="shop-modal-backdrop" id="shop-modal-backdrop" aria-hidden="true"></div>
    <div class="shop-modal-card panel" role="dialog" aria-modal="true" aria-labelledby="shop-modal-title">
      <div class="shop-modal-head">
        <h2 id="shop-modal-title">商店</h2>
        <button type="button" id="shop-modal-close" class="ghost-button shop-modal-close" aria-label="关闭商店">关闭</button>
      </div>
      <p class="muted shop-modal-intro">每件商品下方为购买后的属性变化说明；标有「可送人」的会进入物品栏，可在关系合适时送给当前选中对象。</p>
      <div id="shop-items-container" class="shop-items-container"></div>
    </div>
  </div>

  <script defer src="data/relationships.js"></script>
  <script defer src="data/family-backgrounds.js"></script>
  <script defer src="data/routes.js"></script>
  <script defer src="data/events.js"></script>
  <script defer src="data/extra-events.js"></script>
  <script defer src="data/phase-expansion.js"></script>
  <script defer src="data/romance-expansion.js"></script>
  <script defer src="data/romance-deep-expansion.js"></script>
  <script defer src="data/relationship-arcs.js"></script>
  <script defer src="data/route-events.js"></script>
  <script defer src="data/education-overhaul.js"></script>
  <script defer src="data/relationship-overhaul.js"></script>
  <script defer src="data/endings.js"></script>
  <script defer src="data/overseas-expansion.js"></script>
  <script defer src="data/midlife-flow-expansion.js"></script>
  <script defer src="data/prison-arc-events.js"></script>
  <script defer src="data/life-systems.js"></script>
  <script defer src="data/family-archetype-events.js"></script>
  <script defer src="js/state.js"></script>
  <script defer src="js/engine.js"></script>
  <script defer src="js/ui.js"></script>
</body>
</html>
